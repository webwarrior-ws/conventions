name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

  # see https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
  schedule:
    - cron: "0 0 * * *"

env:
  DOTNET_VERSION: "10.0"
  # As we use .NET>6 now, to run tools compiled for .NETv6 we need to set roll-forward to major
  DOTNET_ROLL_FORWARD: Major
  TYPESCRIPT_VERSION: "5.8.3"
  TYPESCRIPT_ESLINT_VERSION: "8.55.0"
  ESLINT_VERSION: "9.39.2"
  CHECKOUT_ACTION_VERSION: "4"

jobs:
  calc-docker-img-tag:
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.md5sum.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute MD5 sum of Dockerfile
        id: md5sum
        run: |
          echo "tag=$(md5sum Dockerfile.base | awk '{print $1}')" >> $GITHUB_OUTPUT

  docker-img-build-push:
    needs: calc-docker-img-tag
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Check if image exists
        id: check
        run: |
          TAG=${{ needs.calc-docker-img-tag.outputs.tag }}
          IMAGE=ghcr.io/${{ github.repository_owner }}/conventions-ci:$TAG
          if docker manifest inspect $IMAGE > /dev/null 2>&1; then
            echo "image_exists=true" >> $GITHUB_OUTPUT
          else
            echo "image_exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Build and push image
        if: steps.check.outputs.image_exists == 'false'
        run: |
          TAG=${{ needs.calc-docker-img-tag.outputs.tag }}
          IMAGE=ghcr.io/${{ github.repository_owner }}/conventions-ci
          docker build --tag $IMAGE:$TAG .
          docker push $IMAGE:$TAG
      - name: Delete other GHCR package versions (keep current)
        if: steps.check.outputs.image_exists == 'false'
        env:
          TAG: ${{ needs.calc-docker-img-tag.outputs.tag }}
        run: |
          PACKAGE=conventions-ci
          OWNER=${{ github.repository_owner }}
          AUTH_HEADER="Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}"

          # Try org endpoint first, fall back to user endpoint
          VERSIONS=$(curl --silent --header "$AUTH_HEADER" "https://api.github.com/orgs/${OWNER}/packages/container/${PACKAGE}/versions")
          if echo "$VERSIONS" | jq --exit-status 'type == "array"' > /dev/null 2>&1; then
            API_BASE="https://api.github.com/orgs/${OWNER}/packages/container/${PACKAGE}/versions"
          else
            VERSIONS=$(curl --silent --header "$AUTH_HEADER" "https://api.github.com/users/${OWNER}/packages/container/${PACKAGE}/versions")
            API_BASE="https://api.github.com/users/${OWNER}/packages/container/${PACKAGE}/versions"
          fi

          # Delete all versions that don't have the current tag
          echo "$VERSIONS" | jq --raw-output --arg TAG "$TAG" '.[] | select(.metadata.container.tags | index($TAG) | not) | .id' | while read -r VERSION_ID; do
            echo "Deleting version $VERSION_ID"
            curl --silent --request DELETE --header "$AUTH_HEADER" "${API_BASE}/${VERSION_ID}"
          done

  build-fs:
    name: Build F#
    needs: [calc-docker-img-tag, docker-img-build-push]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/conventions-ci:${{ needs.calc-docker-img-tag.outputs.tag }}
    steps:
      - name: Run actions/checkout
        uses: nblockchain/conventions@master
        with:
          uses: actions/checkout@v${{ env.CHECKOUT_ACTION_VERSION }}
      - name: Compile the conventions solution
        run: dotnet build --configuration Release conventions.sln
      - name: Compile F# scripts
        run: ./scripts/compileFSharpScripts.fsx

  file-conventions-tests:
    name: Run FileConventions-lib unit tests
    needs: [build-fs, calc-docker-img-tag]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/conventions-ci:${{ needs.calc-docker-img-tag.outputs.tag }}
    steps:
      - name: Run actions/checkout
        uses: nblockchain/conventions@master
        with:
          uses: actions/checkout@v${{ env.CHECKOUT_ACTION_VERSION }}
      - name: Run tests to validate F# scripts
        run: dotnet test src/FileConventions.Test/FileConventions.Test.fsproj

  build-ts:
    name: Build TypeScript
    needs: [calc-docker-img-tag, docker-img-build-push]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/conventions-ci:${{ needs.calc-docker-img-tag.outputs.tag }}
    steps:
      - name: Run actions/checkout
        uses: nblockchain/conventions@master
        with:
          uses: actions/checkout@v${{ env.CHECKOUT_ACTION_VERSION }}
      - name: Print versions
        run: |
          git --version
          node --version
          npm --version
      - name: Install yarn modules
        run: |
          yarn add --dev typescript@$TYPESCRIPT_VERSION eslint@$ESLINT_VERSION @eslint/js@$ESLINT_VERSION typescript-eslint@$TYPESCRIPT_ESLINT_VERSION
      - name: Install commitlint dependencies
        shell: bash
        run: |
          source commitlint/version.config
          npm install --verbose @commitlint/types@$COMMITLINT_VERSION
      - name: Print versions
        run: |
          git --version
          node --version
          npm --version
      - name: Run typescript compiler
        run: npx tsc
      - name: Run typescript-eslint
        run: npx eslint .

  commitlint-plugins-tests:
    name: Run commitlint-related tests
    needs: [build-ts, calc-docker-img-tag]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/conventions-ci:${{ needs.calc-docker-img-tag.outputs.tag }}
    steps:
      - name: Run actions/checkout
        uses: nblockchain/conventions@master
        with:
          uses: actions/checkout@v${{ env.CHECKOUT_ACTION_VERSION }}
      - name: Install yarn modules
        run: |
          yarn add --dev typescript@$TYPESCRIPT_VERSION ts-node
      - name: Install commitlint dependencies
        run: |
          . commitlint/version.config
          npm install --verbose @commitlint/types@$COMMITLINT_VERSION
      - name: Run typescript compiler
        run: npx tsc
      - name: Print versions
        run: |
          git --version
          node --version
          npm --version
          yarn --version
          npx tsc --version
      - name: Install commitlint
        run: ./commitlint.sh --version
      - name: Run tests to validate our plugins
        run: |
          # remove *.js files so that the same tests don't run twice
          rm ./commitlint/tests/*.js
          yarn test

  sanity-check:
    name: Sanity check
    needs:
      - file-conventions-tests
      - commitlint-plugins-tests
      - calc-docker-img-tag
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/conventions-ci:${{ needs.calc-docker-img-tag.outputs.tag }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Run actions/checkout
        uses: nblockchain/conventions@master
        with:
          uses: actions/checkout@v${{ env.CHECKOUT_ACTION_VERSION }}
          with: |
            {
              "submodules": "recursive",
              "fetch-depth": 0
            }
      - name: Check all files end with EOL
        run: ./scripts/eofConvention.fsx
      - name: Check all .fsx scripts have (proper) shebang
        run: ./scripts/shebangConvention.fsx
      - name: Check all F# scripts have execute permission
        run: ./scripts/executableConvention.fsx
      - name: Check there are no mixed line-endings in any files
        run: ./scripts/mixedLineEndings.fsx
      - name: Check there are no unpinned GitHubActions image versions
        run: ./scripts/unpinnedGitHubActionsImageVersions.fsx
      - name: Check there are no unpinned nuget package reference versions in .NET project files
        run: ./scripts/unpinnedNugetPackageReferenceVersionsInProjects.fsx
      - name: Check there are no unpinned nuget package reference versions in F# scripts
        run: ./scripts/unpinnedNugetPackageReferenceVersionsInFSharpScripts.fsx
      - name: Check there are no unpinned versions in `dotnet tool install` commands
        run: ./scripts/unpinnedDotnetToolInstallVersions.fsx
      - name: Check there are no inconsistent versions GitHubCI files
        run: ./scripts/inconsistentVersionsInGitHubCI.fsx
      - name: Check there are no inconsistent versions in nuget package references of F# scripts
        run: ./scripts/inconsistentNugetVersionsInFSharpScripts.fsx
      - name: Check there are no non-verbose flags in scripts and CI YML files
        run: ./scripts/nonVerboseFlagsInGitHubCIAndScripts.fsx
      - name: Sanity check nuget packages of .NET projects
        run: |
          dotnet restore
          ./scripts/inconsistentNugetVersionsInDotNetProjects.fsx
      - name: Check there are no inconsistent versions in nuget package references of F# scripts and projects
        run: ./scripts/inconsistentNugetVersionsInDotNetProjectsAndFSharpScripts.fsx
      - name: FSharpLint
        run: |
          ./scripts/runFSharpLint.fsx
      - name: Run git+githubCI workaround
        run: |
          # workaround for https://github.com/actions/runner/issues/2033
          git config --global --add safe.directory '*'
      - name: fantomless
        run: |
          dotnet tool install fantomless-tool --version 4.7.997-prerelease
          dotnet fantomless --recurse .
          git diff --exit-code || (echo "Formatting did not match (see above diff), please run fantomless-tool" >&2 && exit 1)
      - name: Print versions
        run: |
          git --version
          node --version
          npm --version
      - name: Run git+githubCI workaround
        run: |
          # We need this step so we can change the files using `npx prettier --write` in the next step.
          # Otherwise we get permission denied error in the CI.
          chmod 777 --recursive .
      - name: Install prettier
        run: npm install --verbose
      - name: Run "prettier" to check the style of our TypeScript and YML code
        run: |
          npm run format
          # Since we changed file modes in the previous step we need the following command to
          # make git ignore mode changes in files and doesn't include them in the git diff command.
          git config core.fileMode false
          # Since after installing commitlint dependencies package.json file changes, we need to 
          # run the following command to ignore package.json file
          git restore package.json
          git diff --exit-code || (echo "Formatting did not match (see above diff), please run 'npm run format'" >&2 && exit 1)
      - name: Validate current commit (last commit) with commitlint
        if: github.event_name == 'push'
        run: ./commitlint.sh --last --verbose
      - name: Validate PR commits with commitlint
        if: github.event_name == 'pull_request'
        run: |
          ./commitlint.sh --verbose \
            --from ${{ github.event.pull_request.head.sha }}~${{ github.event.pull_request.commits }} \
            --to ${{ github.event.pull_request.head.sha }}
      - name: Check commits 1 by 1
        if: github.event_name == 'pull_request'
        run: ./scripts/checkCommits1by1.fsx
